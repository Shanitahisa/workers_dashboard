{% extends 'dashapp/base.html' %}

{% block content %}
<div class="card">
    <h3>Create Alert</h3>
    <p class="muted">Send an alert to selected workers, or leave recipients blank to send it to everyone.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Send Alert</button>
        <a class="btn secondary" href="{% url 'dashapp:alert_list' %}">Cancel</a>
    </form>
</div>
{% endblock %}
