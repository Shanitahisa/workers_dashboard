<!doctype html>
{% load static %}
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | COFTU Dashboard</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #14213d;
            background: linear-gradient(120deg, #102a43 0%, #0f766e 100%);
            padding: 18px;
        }
        .panel {
            width: min(440px, 100%);
            background: #fff;
            padding: 28px;
            border-radius: 8px;
            box-shadow: 0 20px 45px rgba(2, 6, 23, 0.22);
        }
        .brand-mark {
            width: 76px;
            height: 76px;
            display: block;
            object-fit: contain;
            margin-bottom: 14px;
        }
        h1 { margin: 0 0 6px; font-size: 26px; letter-spacing: 0; }
        p { margin: 0 0 20px; color: #64748b; }
        label { display: block; margin-bottom: 6px; color: #64748b; font-size: 13px; font-weight: 800; }
        input {
            width: 100%;
            padding: 11px;
            margin-bottom: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font: inherit;
        }
        input:focus { outline: 3px solid rgba(15, 118, 110, 0.18); border-color: #0f766e; }
        button {
            width: 100%;
            padding: 11px;
            border: 0;
            border-radius: 8px;
            background: #0f766e;
            color: #fff;
            font-weight: 800;
            cursor: pointer;
        }
        button:hover { background: #134e4a; }
        .errorlist { color: #b42318; font-weight: 700; }
    </style>
</head>
<body>
<div class="panel">
    <img class="brand-mark" src="{% static 'images/LOGO-no-bg.png' %}" alt="COFTU logo">
    <h1>Sign in</h1>
    <p>Access the COFTU workers coordination dashboard.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
